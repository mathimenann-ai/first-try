<!DOCTYPE html>
<html>
<head> 
    <title> PRACTICE WEPAGE</title>

</head>
<body>
    <!-- <img> tag attributes practising -->
    <div class="img">
      <img src="s.sanmenan.png" title="s.sanmenan" alt="photo" width="200" height="200">
    </div>

    
    <!-- <input> tag attributes practising along with <form> -->
    <form>
        <div class="input"> 
        <div class="name">
        <label>
            Name:
            <input type="text" name="user-name" placeholder="username" value="s.sanmenan" >
        </label>
        </div>

        <div class="DOB">
          <label>
            DOB : 
           <input type="date" >
          </label>
        </div>
       
     <div class='email'>
        <!-- explicit connection for and id -->
        <label for="user-email">Email:</label>
        <input type="email" id="user-email" name="email" required>
     </div>
    </form>
     
    


</body>
</html>
