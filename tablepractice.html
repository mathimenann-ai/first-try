<!DOCTYPE html>
<html lang="en">
<head>
    <title>HTML Table Practice</title>
</head>
<body>
    <!-- table creation using <table> <tr> <th> <td> <caption> <thead> <tbody> tags -->
    <table border="4">
        <caption>Projects</caption>
        <thead>
           
            <tr>
                <th>Project</th>
                <th>Description</th>
                <th>Year</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td> HTML Laboratory </td>
                <td> Portfolio built using only HTML </td>
                <td> 2026 </td>
            </tr>

            <tr>
                <td> Coming Soon          </td>
                <td>   More projects will be added  </td>
                <td> Future</td>
            </tr>
        </tbody>



    </table>
    <a href="https://youtu.be/LMsh4csmpLU?si=T-CDhh0kewhGNEE-" target="_blank"></a>
</body>
